{% extends "base.html" %}
{% block title %}Cart — Demo Store{% endblock %}
{% block content %}
<h2>Shopping Cart</h2>

{% if items %}
<figure>
<table>
    <thead>
        <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Subtotal</th>
        </tr>
    </thead>
    <tbody>
        {% for item in items %}
        <tr>
            <td>{{ item.name }}</td>
            <td>{{ item.currency }} {{ "%.2f"|format(item.price) }}</td>
            <td>{{ item.quantity }}</td>
            <td>{{ item.currency }} {{ "%.2f"|format(item.price * item.quantity) }}</td>
        </tr>
        {% endfor %}
    </tbody>
    <tfoot>
        <tr>
            <td colspan="3"><strong>Total</strong></td>
            <td><strong>EUR {{ "%.2f"|format(total) }}</strong></td>
        </tr>
    </tfoot>
</table>
</figure>
<a href="/checkout" role="button">Proceed to Checkout</a>
{% else %}
<p>Your cart is empty. <a href="/">Browse the catalog</a></p>
{% endif %}
{% endblock %}
